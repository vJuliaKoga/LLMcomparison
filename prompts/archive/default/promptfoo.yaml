# プロンプト
# ※ このファイルは prompts/ フォルダ内に置く想定
# パスはすべてこのYAMLファイルからの相対パス
prompts:
  - file://hybrid-test-generation.txt

# llm-rubric 採点モデル = OpenAI エンタープライズ API（評価専用・生成には使わない）
defaultTest:
  options:
    provider:
      id: openai:gpt-4o
      config:
        apiKey: "{{env.OPENAI_API_KEY_ENTERPRISE}}"

evaluateOptions:
  maxConcurrency: 1   # 無料枠は直列実行（429対策）
  delay: 3000         # リクエスト間隔ms（429が続く場合は5000に増やす）

providers:

  # OpenRouter 無料枠（OPENROUTER_API_KEY） ──────────────────────────────

  - id: openrouter:qwen/qwen3-coder:free
    label: "Qwen3-Coder"
    config:
      temperature: 0.4
      max_tokens: 4000

  - id: openrouter:meta-llama/llama-3.3-70b-instruct:free
    label: "Llama-3.3-70B"
    config:
      temperature: 0.4
      max_tokens: 4000

  - id: openrouter:google/gemma-3-27b-it:free
    label: "Gemma-3-27B"
    config:
      temperature: 0.4
      max_tokens: 4000

  - id: openrouter:deepseek/deepseek-chat-v3-0324:free
    label: "DeepSeek-V3-0324"
    config:
      temperature: 0.4
      max_tokens: 4000

  - id: openrouter:deepseek/deepseek-r1:free
    label: "DeepSeek-R1"
    config:
      temperature: 0.4
      max_tokens: 6000  # CoTトークン分を多めに確保

  - id: openrouter:deepseek/deepseek-r1-distill-llama-70b:free
    label: "DeepSeek-R1-Distill-70B"
    config:
      temperature: 0.4
      max_tokens: 4000

tests:

  # ------------------------------------------------------------
  # ログイン機能
  # ------------------------------------------------------------
  - description: "ログイン機能E2E（JUnit5 + Selenium）"
    vars:
      specification: file://../specs/securebank-spec.md
      source_code: file://../financial-demo-app.html
      feature: "ログイン機能（基本認証、MFA、ログイン試行制限）"

    assert:
      - type: contains-all
        value:
          - "テスト設計（テストケース一覧）"
          - "テストケースID"
          - "期待結果"
          - "実装根拠"

      - type: javascript
        value: return /```java[\s\S]*org\.junit\.jupiter[\s\S]*```/m.test(output);

      - type: contains
        value: "org.junit.jupiter.api.Test"

      - type: contains-all
        value:
          - "WebDriver"
          - "WebDriverWait"
          - "@Test"
          - "@BeforeEach"
          - "@AfterEach"

      - type: javascript
        value: |
          const m = output.match(/@Test/g) || [];
          return m.length >= 3;

      - type: javascript
        value: |
          const blocks = output.match(/```java[\s\S]*?```/g) || [];
          return !blocks.join('\n').includes('Thread.sleep');

      - type: javascript
        value: return !output.includes('assertTrue(true)');

      - type: llm-rubric
        value: "状態遷移・ロック・MFA・異常系・境界値・セキュリティがバランス良く含まれ実行可能"

  # ------------------------------------------------------------
  # 振込機能
  # ------------------------------------------------------------
  - description: "振込機能E2E（境界値・異常系・承認フロー）"
    vars:
      specification: file://../specs/securebank-spec.md
      source_code: file://../financial-demo-app.html
      feature: "振込機能（全バリデーション、承認フロー含む）"

    assert:
      - type: javascript
        value: return /```java[\s\S]*WebDriver[\s\S]*```/m.test(output);

      - type: contains-all
        value:
          - "残高不足"
          - "上限"
          - "承認"

      - type: javascript
        value: |
          const m = output.match(/@Test/g) || [];
          return m.length >= 3;

      - type: javascript
        value: |
          const blocks = output.match(/```java[\s\S]*?```/g) || [];
          return !blocks.join('\n').includes('Thread.sleep');

      - type: javascript
        value: return !output.includes('assertTrue(true)');

  # ------------------------------------------------------------
  # 権限制御
  # ------------------------------------------------------------
  - description: "RBAC（監査ログ）E2E"
    vars:
      specification: file://../specs/securebank-spec.md
      source_code: file://../financial-demo-app.html
      feature: "監査ログ機能（役割別アクセス制御）"

    assert:
      - type: contains-all
        value:
          - "admin"
          - "auditor"
          - "customer"

      - type: javascript
        value: return /```java[\s\S]*@Test[\s\S]*```/m.test(output);

      - type: javascript
        value: return !output.includes('assertTrue(true)');

  # ------------------------------------------------------------
  # 自己検証セクション
  # ------------------------------------------------------------
  - description: "自己検証セクション存在"
    vars:
      specification: file://../specs/securebank-spec.md
      source_code: file://../financial-demo-app.html
      feature: "共通"

    assert:
      - type: contains-all
        value:
          - "(D) 自己検証"
          - "total_cases:"
          - "category_counts:"
          - "duplicate_case_ids:"
          - "has_java_code_block:"

outputPath: ./../results/evaluation-results.json