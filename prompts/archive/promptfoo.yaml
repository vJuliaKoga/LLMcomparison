  # ------------------------------------------------------------
  # 軽量版
  # ------------------------------------------------------------
prompts:
  - file://hybrid-test-generation.txt

defaultTest:
  options:
    provider:
      id: openai:gpt-4o
      config:
        apiKey: "{{env.OPENAI_API_KEY_ENTERPRISE}}"

evaluateOptions:
  maxConcurrency: 1
  delay: 5000

providers:
  - id: openrouter:meta-llama/llama-3.3-70b-instruct:free
    label: "Llama-3.3-70B"
    config:
      temperature: 0.2
      max_tokens: 2600

  - id: openrouter:mistralai/mistral-small-3.1-24b-instruct:free
    label: "Mistral-Small-3.1-24B"
    config:
      temperature: 0.2
      max_tokens: 2400

  - id: openrouter:arcee-ai/trinity-large-preview:free
    label: "Trinity-Large-Preview"
    config:
      temperature: 0.2
      max_tokens: 2400

tests:
  - description: "ログイン機能E2E（軽量版）"
    vars:
      specification: file://../specs/securebank-spec.md
      source_code: file://../financial-demo-app.html
      feature: "ログイン機能（基本認証、MFA、ログイン試行制限）"

    assert:
      - type: contains-all
        value:
          - "(A) テスト設計"
          - "テストケースID"
          - "期待結果"
          - "(B) JUnit 5 + Selenium E2Eテストコード"

      - type: javascript
        value: return /```java[\s\S]*org\.junit\.jupiter[\s\S]*```/m.test(output);

      - type: contains-all
        value:
          - "WebDriver"
          - "WebDriverWait"
          - "@Test"
          - "@BeforeEach"
          - "@AfterEach"

      - type: javascript
        value: |
          const m = output.match(/@Test/g) || [];
          return m.length >= 3;

      - type: javascript
        value: |
          const blocks = output.match(/```java[\s\S]*?```/g) || [];
          return !blocks.join('\n').includes('Thread.sleep');

      - type: javascript
        value: return !output.includes('assertTrue(true)');

      - type: contains-all
        value:
          - "(C) 仕様と実装の不整合一覧"
          - "(D) 自己検証"
          - "total_cases:"
          - "has_java_code_block:"

  - description: "振込機能E2E（軽量版）"
    vars:
      specification: file://../specs/securebank-spec.md
      source_code: file://../financial-demo-app.html
      feature: "振込機能（全バリデーション、承認フロー含む）"

    assert:
      - type: javascript
        value: return /```java[\s\S]*WebDriver[\s\S]*```/m.test(output);

      - type: contains-all
        value:
          - "残高不足"
          - "上限"
          - "承認"

      - type: javascript
        value: |
          const m = output.match(/@Test/g) || [];
          return m.length >= 3;

      - type: javascript
        value: |
          const blocks = output.match(/```java[\s\S]*?```/g) || [];
          return !blocks.join('\n').includes('Thread.sleep');

      - type: javascript
        value: return !output.includes('assertTrue(true)');

  - description: "RBAC（監査ログ）E2E（軽量版）"
    vars:
      specification: file://../specs/securebank-spec.md
      source_code: file://../financial-demo-app.html
      feature: "監査ログ機能（役割別アクセス制御）"

    assert:
      - type: contains-all
        value:
          - "admin"
          - "auditor"
          - "customer"

      - type: javascript
        value: return /```java[\s\S]*@Test[\s\S]*```/m.test(output);

      - type: javascript
        value: return !output.includes('assertTrue(true)');

outputPath: ./../results/evaluation-results-light.json