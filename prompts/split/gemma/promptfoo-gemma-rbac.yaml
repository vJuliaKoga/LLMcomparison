prompts:
  - file://hybrid-test-generation-gemma.txt

evaluateOptions:
  maxConcurrency: 1
  delay: 6000

providers:
  - id: openrouter:google/gemma-3n-e4b-it:free
    label: "Gemma-3n-4B-Free"
    config:
      temperature: 0.2
      max_tokens: 1800

tests:
  - description: "RBAC（監査ログ）E2E（gemma・単体）"
    vars:
      specification: file://../../../specs/securebank-spec-rbac.md
      ui_context: file://../../../specs/financial-demo-app-context.yaml
      feature: "監査ログ機能（役割別アクセス制御）"

    assert:
      - type: contains
        value: "```java"

      - type: contains-all
        value:
          - "admin"
          - "auditor"
          - "customer"

      - type: javascript
        value: "/```java[\\s\\S]*@Test[\\s\\S]*```/m.test(output)"

      - type: javascript
        value: "!output.includes('assertTrue(true)')"

outputPath: ./../../../results/gemma/evaluation-results-gemma-rbac.json