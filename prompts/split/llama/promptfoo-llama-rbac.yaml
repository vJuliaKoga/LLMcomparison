prompts:
- file://hybrid-test-generation-llama.txt
evaluateOptions:
  maxConcurrency: 1
  delay: 15000
providers:
- id: openrouter:meta-llama/llama-3.3-70b-instruct:free
  label: Llama-3.3-70B
  config:
    temperature: 0.2
    max_tokens: 1800
tests:
- description: RBAC（監査ログ）E2E（llama・単体）
  vars:
    specification: file://../../../specs/securebank-spec-rbac.md
    ui_context: file://../../../specs/financial-demo-app-context.yaml
    feature: 監査ログ機能（役割別アクセス制御）
  assert:
  - type: contains
    value: '```java'
  - type: contains-all
    value:
    - admin
    - auditor
    - customer
  - type: javascript
    value: /```java[\s\S]*@Test[\s\S]*```/m.test(output)
  - type: javascript
    value: '!output.includes(''assertTrue(true)'')'
outputPath: ./../../../results/llama/evaluation-results-llama-rbac.json
