prompts:
- file://hybrid-test-generation-glm.txt
evaluateOptions:
  maxConcurrency: 1
  delay: 8000
providers:
- id: openrouter:z-ai/glm-4.5-air:free
  label: "GLM-4.5-Air-Free"
  config:
    temperature: 0.2
    max_tokens: 2500
tests:
- description: RBAC（監査ログ）E2E（glm・単体）
  vars:
    specification: file://../../../specs/securebank-spec-rbac.md
    ui_context: file://../../../specs/financial-demo-app-context.yaml
    feature: 監査ログ機能（役割別アクセス制御）
  assert:
  - type: contains
    value: '```java'
  - type: contains-all
    value:
    - admin
    - auditor
    - customer
  - type: javascript
    value: /```java[\s\S]*@Test[\s\S]*```/m.test(output)
  - type: javascript
    value: '!output.includes(''assertTrue(true)'')'
outputPath: ./../../../results/glm/evaluation-results-glm-rbac.json
