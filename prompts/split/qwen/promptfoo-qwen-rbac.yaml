prompts:
  - file://hybrid-test-generation-qwen.txt

evaluateOptions:
  maxConcurrency: 1
  delay: 6000

providers:
  - id: openrouter:qwen/qwen3-next-80b-a3b-instruct:free
    label: "Qwen3-Next-80B-Free"
    config:
      temperature: 0.2
      max_tokens: 1800

tests:
  - description: "RBAC（監査ログ）E2E（qwen・単体）"
    vars:
      specification: file://../../../specs/securebank-spec-rbac.md
      ui_context: file://../../../specs/financial-demo-app-context.yaml
      feature: "監査ログ機能（役割別アクセス制御）"

    assert:
      - type: contains
        value: "```java"

      - type: contains-all
        value:
          - "admin"
          - "auditor"
          - "customer"

      - type: javascript
        value: "/```java[\\s\\S]*@Test[\\s\\S]*```/m.test(output)"

      - type: javascript
        value: "!output.includes('assertTrue(true)')"

outputPath: ./../../../results/qwen/evaluation-results-qwen-rbac.json