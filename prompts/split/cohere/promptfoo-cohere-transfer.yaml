prompts:
- file://hybrid-test-generation-cohere.txt
evaluateOptions:
  maxConcurrency: 1
  delay: 6000
providers:
- id: https://api.cohere.com/v2/chat
  config:
    method: POST
    headers:
      Authorization: Bearer {{env.COHERE_API_KEY}}
      Content-Type: application/json
    body:
      model: command-r7b-12-2024
      messages:
      - role: user
        content: '{{prompt}}'
      temperature: 0.2
      max_tokens: 1800
    transformResponse: json.message.content[0].text
tests:
- description: 振込機能E2E（cohere・単体）
  vars:
    specification: file://../../../specs/securebank-spec-transfer.md
    ui_context: file://../../../specs/financial-demo-app-context.yaml
    feature: 振込機能（全バリデーション、承認フロー含む）
  assert:
  - type: contains
    value: '```java'
  - type: javascript
    value: output.includes('WebDriver')
  - type: contains-all
    value:
    - WebDriver
    - WebDriverWait
    - '@Test'
    - '@BeforeEach'
    - '@AfterEach'
  - type: javascript
    value: |
      const m = output.match(/@Test/g) || [];
      return m.length >= 2;
  - type: javascript
    value: |
      const blocks = output.match(/```java[\s\S]*?```/g) || [];
      return !blocks.join('\n').includes('Thread.sleep');
  - type: javascript
    value: '!output.includes(''assertTrue(true)'')'
outputPath: ./../../../results/cohere/evaluation-results-cohere-transfer.json
